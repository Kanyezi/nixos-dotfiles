# =============================================================================
# Hyprland 全局变量配置
# =============================================================================
# 本文件包含所有Hyprland配置中使用的变量定义
# 变量命名规范：使用下划线分隔，分类前缀，布尔值使用enable_前缀

# =============================================================================
# 应用程序配置
# =============================================================================
$app_terminal = kitty                    # 默认终端
$app_browser = firefox                   # 默认浏览器
$app_editor = code                       # 默认代码编辑器
$app_file_manager = thunar               # 默认文件管理器

# =============================================================================
# 用户界面配置
# =============================================================================
# 窗口外观
$ui_window_opacity = 0.95               # 窗口透明度
$ui_window_rounding = 10                 # 窗口圆角半径
$ui_window_border_size = 2               # 窗口边框大小
$ui_active_border_color = rgba($primarye6)      # 活动窗口边框颜色
$ui_inactive_border_color = rgba($onSurfaceVariant11)  # 非活动窗口边框颜色

# 间隙设置
$ui_workspace_gaps = 20                  # 工作区边缘间隙
$ui_window_gaps_in = 5                   # 窗口间内间隙
$ui_window_gaps_out = 10                 # 窗口外间隙（多窗口）
$ui_single_window_gaps_out = 10          # 单窗口外间隙

# 模糊效果
$ui_enable_blur = false                  # 全局模糊开关
$ui_enable_blur_special_ws = false       # 特殊工作区模糊
$ui_enable_blur_popups = true            # 弹出菜单模糊
$ui_enable_blur_input_methods = true     # 输入法面板模糊
$ui_blur_size = 8                       # 模糊核大小
$ui_blur_passes = 2                      # 模糊迭代次数
$ui_blur_xray = false                    # X射线模糊模式

# 阴影效果
$ui_enable_shadow = true                 # 阴影开关
$ui_shadow_range = 20                    # 阴影扩散半径
$ui_shadow_render_power = 3              # 阴影采样幂次
$ui_shadow_color = rgba($surfaced4)      # 阴影颜色

# =============================================================================
# 输入设备配置
# =============================================================================
# 触控板设置
$input_enable_touchpad_disable_typing = true    # 打字时禁用触控板
$input_touchpad_scroll_factor = 0.3             # 触控板滚动速度倍率

# 鼠标设置
$input_cursor_theme = sweet-cursors      # 鼠标指针主题
$input_cursor_size = 24                  # 指针大小

# =============================================================================
# 手势配置
# =============================================================================
$gesture_workspace_swipe_fingers = 4     # 工作区切换手势（四指）
$gesture_default_fingers = 3             # 默认手势（三指）
$gesture_extra_fingers = 4               # 额外手势（四指）

# =============================================================================
# 系统配置
# =============================================================================
$sys_volume_step = 10                    # 音量调节步长（百分比）

# =============================================================================
# 快捷键别名配置
# =============================================================================
# 工作区操作
$kb_go_to_workspace = Super              # 跳转到工作区
$kb_move_window_to_workspace = Super+Shift    # 移动窗口到工作区
$kb_move_window_to_workspace_group = Ctrl+Super+Alt  # 跨组移动窗口
$kb_go_to_workspace_group = Ctrl+Super   # 跨组跳转工作区
$kb_next_workspace = Ctrl+Super, right   # 下一个工作区
$kb_prev_workspace = Ctrl+Super, left    # 上一个工作区
$kb_toggle_special_workspace = Super, S  # 切换特殊工作区

# 窗口组操作
$kb_window_group_cycle_next = Alt, Tab           # 组内窗口正向循环
$kb_window_group_cycle_prev = Shift+Alt, Tab     # 组内窗口反向循环
$kb_ungroup_window = Super, U                     # 移出当前组
$kb_toggle_group = Super, Comma                  # 加入/脱离组

# 窗口操作
$kb_move_window = Super, Z               # 移动窗口
$kb_resize_window = Super, X            # 调整窗口大小
$kb_window_pip = Super+Alt, Backslash    # 画中画模式
$kb_pin_window = Super, P                # 窗口置顶
$kb_window_fullscreen = Super, F         # 全屏切换
$kb_window_bordered_fullscreen = Super+Alt, F    # 带边框全屏
$kb_toggle_window_floating = Super+Alt, Space   # 切换浮动模式
$kb_close_window = Super, Q              # 关闭窗口

# 特殊工作区
$kb_system_monitor = Ctrl+Shift, Escape  # 系统监视器
$kb_music_player = Super, M              # 音乐播放器
$kb_communication = Super, D             # 通讯应用
$kb_todo_list = Super, R                 # 待办事项

# 应用启动
$kb_launch_terminal = Super, T           # 启动终端
$kb_launch_browser = Super, W            # 启动浏览器
$kb_launch_editor = Super, C             # 启动编辑器
$kb_launch_file_manager = Super, E       # 启动文件管理器

# 系统操作
$kb_session_menu = Ctrl+Alt, Delete      # 会话菜单
$kb_clear_notifications = Ctrl+Alt, C    # 清除通知
$kb_show_panels = Super, K               # 显示面板
$kb_lock_screen = Super, L               # 锁屏
$kb_restore_lock = Super+Alt, L          # 恢复锁屏界面