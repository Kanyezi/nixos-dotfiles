# =============================================================================
# Hyprland 主配置文件
# =============================================================================
# 此文件是Hyprland配置的入口点，负责加载所有子配置文件
# 配置加载顺序：变量 -> 核心 -> 外观 -> 行为 -> 启动

# =============================================================================
# 路径变量定义
# =============================================================================
$hypr = ~/dotfiles/hypr
$config = $hypr/config

# =============================================================================
# 主题配置
# =============================================================================
# 复制默认主题到当前主题（如果不存在）
exec = cp -L --no-preserve=mode --update=none $hypr/themes/schemes/default.conf $hypr/themes/current.conf
source = $hypr/themes/current.conf

# =============================================================================
# 全局变量
# =============================================================================
source = $hypr/variables.conf

# =============================================================================
# 显示器配置
# =============================================================================
monitor = , preferred, auto, 1

# =============================================================================
# 配置模块加载
# =============================================================================
# 核心配置（基础设置）
source = $config/core/env.conf
source = $config/core/general.conf
source = $config/core/input.conf
source = $config/core/misc.conf

# 外观配置（视觉效果）
source = $config/appearance/decoration.conf
source = $config/appearance/animations.conf
source = $config/appearance/group.conf

# 行为配置（交互和规则）
source = $config/behavior/gestures.conf
source = $config/behavior/rules.conf
source = $config/behavior/keybinds.conf

# 启动配置（自动启动程序）
source = $config/startup/execs.conf