# =============================================================================
# 环境变量配置
# =============================================================================

# =============================================================================
# 主题和外观
# =============================================================================
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = XCURSOR_THEME, $input_cursor_theme
env = XCURSOR_SIZE, $input_cursor_size

# =============================================================================
# Qt 图标主题配置 (Quickshell 需要)
# =============================================================================
# Qt 图标主题设置
env = QT_QPA_ICON_THEME, Papirus-Dark
env = QT_ICON_THEME, Papirus-Dark

# Qt 图标主题搜索路径
env = QT_QPA_ICON_THEME_PATH, /usr/share/icons:/usr/local/share/icons:~/.local/share/icons
env = QT_ICON_THEME_PATH, /usr/share/icons:/usr/local/share/icons:~/.local/share/icons

# Qt 主题配置 (如果安装了 qt6ct/qt5ct)
# env = QT_QPA_PLATFORM_THEME, qt6ct
# env = QT_STYLE_OVERRIDE, qt6ct-style

# Qt 高 DPI 和缩放设置
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = QT_ENABLE_HIGHDPI_SCALING, 1
env = QT_SCALE_FACTOR, 1

# Qt 字体渲染设置
env = QT_FONT_DPI, 96

# Qt 图标缓存和性能设置
env = QT_QPA_ICON_CACHE, 1
env = QT_QPA_ICON_CACHE_SIZE, 1000

# Qt 图标主题备用设置
env = QT_QPA_ICON_THEME_FALLBACK, hicolor
env = QT_ICON_THEME_FALLBACK, hicolor

# =============================================================================
# 工具包后端
# =============================================================================
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM, wayland;xcb
env = SDL_VIDEODRIVER, wayland,x11,windows
env = CLUTTER_BACKEND, wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# =============================================================================
# XDG 规范
# =============================================================================
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# =============================================================================
# 其他设置
# =============================================================================
env = _JAVA_AWT_WM_NONREPARENTING, 1

# =============================================================================
# 输入法设置
# =============================================================================
env = GTK_IM_MODULE, fcitx5
env = QT_IM_MODULE, fcitx5
env = QT5_IM_MODULE, fcitx5
env = XMODIFIERS, @im=fcitx5