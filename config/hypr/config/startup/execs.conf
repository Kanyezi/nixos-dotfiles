# =============================================================================
# 自动启动程序配置
# =============================================================================

# =============================================================================
# 系统服务
# =============================================================================
# 密钥环和认证
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# =============================================================================
# 剪贴板管理
# =============================================================================
# 剪贴板历史记录
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# =============================================================================
# 系统维护
# =============================================================================
# 自动清理30天前的垃圾文件
exec-once = trash-empty 30

# =============================================================================
# 外观设置
# =============================================================================
# 鼠标指针设置
exec-once = hyprctl setcursor $input_cursor_theme $input_cursor_size
exec-once = gsettings set org.gnome.desktop.interface cursor-theme '$input_cursor_theme'
exec-once = gsettings set org.gnome.desktop.interface cursor-size $input_cursor_size

# =============================================================================
# 系统功能
# =============================================================================
# 位置服务和夜间模式
exec-once = /usr/lib/geoclue-2.0/demos/agent
exec-once = sleep 1 && gammastep

# 网络代理
exec-once = clash

# 输入法
exec-once = fcitx5

# 蓝牙媒体控制转发到 MPRIS
exec-once = mpris-proxy

# =============================================================================
# 窗口管理
# =============================================================================
# 基于匹配规则调整窗口大小和位置（如画中画）
exec-once = quickshell -d