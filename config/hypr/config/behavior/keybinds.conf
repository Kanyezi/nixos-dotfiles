# =============================================================================
# 快捷键绑定配置
# =============================================================================
exec = hyprctl dispatch submap global
submap = global

# =============================================================================
# Shell 快捷键
# =============================================================================
# 启动器快捷键
bindi = Super, Super_L, global, caelestia:launcher
bindin = Super, catchall, global, caelestia:launcherInterrupt
bindin = Super, mouse:272, global, caelestia:launcherInterrupt
bindin = Super, mouse:273, global, caelestia:launcherInterrupt
bindin = Super, mouse:274, global, caelestia:launcherInterrupt
bindin = Super, mouse:275, global, caelestia:launcherInterrupt
bindin = Super, mouse:276, global, caelestia:launcherInterrupt
bindin = Super, mouse:277, global, caelestia:launcherInterrupt
bindin = Super, mouse_up, global, caelestia:launcherInterrupt
bindin = Super, mouse_down, global, caelestia:launcherInterrupt


# =============================================================================
# 系统快捷键
# =============================================================================
# 杂项系统操作
bind = $kb_session_menu, global, caelestia:session
bindl = $kb_clear_notifications, global, caelestia:clearNotifs
bind = $kb_show_panels, global, caelestia:showall
bind = $kb_lock_screen, global, caelestia:lock

# 恢复锁屏
bindl = $kb_restore_lock, exec, caelestia shell -d
bindl = $kb_restore_lock, global, caelestia:lock

# =============================================================================
# 硬件快捷键
# =============================================================================
# 亮度控制
bindl = , XF86MonBrightnessUp, global, caelestia:brightnessUp
bindl = , XF86MonBrightnessDown, global, caelestia:brightnessDown

# =============================================================================
# 媒体控制
# =============================================================================
# 媒体播放控制
bindl = Ctrl+Super, Space, global, caelestia:mediaToggle
bindl = , XF86AudioPlay, global, caelestia:mediaToggle
bindl = , XF86AudioPause, global, caelestia:mediaToggle
bindl = Ctrl+Super, Equal, global, caelestia:mediaNext
bindl = , XF86AudioNext, global, caelestia:mediaNext
bindl = Ctrl+Super, Minus, global, caelestia:mediaPrev
bindl = , XF86AudioPrev, global, caelestia:mediaPrev
bindl = , XF86AudioStop, global, caelestia:mediaStop

# =============================================================================
# 系统重启快捷键
# =============================================================================
bindr = Ctrl+Super+Shift, R, exec, qs -c caelestia kill
bindr = Ctrl+Super+Alt, R, exec, qs -c caelestia kill; caelestia shell -d

# =============================================================================
# 工作区导航
# =============================================================================
# 工作区脚本路径
$wsaction = ~/.config/hypr/scripts/wsaction.fish

# 跳转到指定工作区
bind = $kb_go_to_workspace, 1, exec, $wsaction workspace 1
bind = $kb_go_to_workspace, 2, exec, $wsaction workspace 2
bind = $kb_go_to_workspace, 3, exec, $wsaction workspace 3
bind = $kb_go_to_workspace, 4, exec, $wsaction workspace 4
bind = $kb_go_to_workspace, 5, exec, $wsaction workspace 5
bind = $kb_go_to_workspace, 6, exec, $wsaction workspace 6
bind = $kb_go_to_workspace, 7, exec, $wsaction workspace 7
bind = $kb_go_to_workspace, 8, exec, $wsaction workspace 8
bind = $kb_go_to_workspace, 9, exec, $wsaction workspace 9
bind = $kb_go_to_workspace, 0, exec, $wsaction workspace 10
# Go to workspace group #
bind = $kb_go_to_workspace_group, 1, exec, $wsaction -g workspace 1
bind = $kb_go_to_workspace_group, 2, exec, $wsaction -g workspace 2
bind = $kb_go_to_workspace_group, 3, exec, $wsaction -g workspace 3
bind = $kb_go_to_workspace_group, 4, exec, $wsaction -g workspace 4
bind = $kb_go_to_workspace_group, 5, exec, $wsaction -g workspace 5
bind = $kb_go_to_workspace_group, 6, exec, $wsaction -g workspace 6
bind = $kb_go_to_workspace_group, 7, exec, $wsaction -g workspace 7
bind = $kb_go_to_workspace_group, 8, exec, $wsaction -g workspace 8
bind = $kb_go_to_workspace_group, 9, exec, $wsaction -g workspace 9
bind = $kb_go_to_workspace_group, 0, exec, $wsaction -g workspace 10
# Go to workspace -1/+1
bind = Super, mouse_down, workspace, -1
bind = Super, mouse_up, workspace, +1
binde = $kb_prev_workspace, workspace, -1
binde = $kb_next_workspace, workspace, +1
binde = Super, Page_Up, workspace, -1
binde = Super, Page_Down, workspace, +1
# Go to workspace group -1/+1
bind = Ctrl+Super, mouse_down, workspace, -10
bind = Ctrl+Super, mouse_up, workspace, +10
# Toggle special workspace
bind = $kb_toggle_special_workspace, exec, caelestia toggle specialws

# Move window to workspace #
bind = $kb_move_window_to_workspace, 1, exec, $wsaction movetoworkspace 1
bind = $kb_move_window_to_workspace, 2, exec, $wsaction movetoworkspace 2
bind = $kb_move_window_to_workspace, 3, exec, $wsaction movetoworkspace 3
bind = $kb_move_window_to_workspace, 4, exec, $wsaction movetoworkspace 4
bind = $kb_move_window_to_workspace, 5, exec, $wsaction movetoworkspace 5
bind = $kb_move_window_to_workspace, 6, exec, $wsaction movetoworkspace 6
bind = $kb_move_window_to_workspace, 7, exec, $wsaction movetoworkspace 7
bind = $kb_move_window_to_workspace, 8, exec, $wsaction movetoworkspace 8
bind = $kb_move_window_to_workspace, 9, exec, $wsaction movetoworkspace 9
bind = $kb_move_window_to_workspace, 0, exec, $wsaction movetoworkspace 10
# Move window to workspace group #
bind = $kb_move_window_to_workspaceGroup, 1, exec, $wsaction -g movetoworkspace 1
bind = $kb_move_window_to_workspaceGroup, 2, exec, $wsaction -g movetoworkspace 2
bind = $kb_move_window_to_workspaceGroup, 3, exec, $wsaction -g movetoworkspace 3
bind = $kb_move_window_to_workspaceGroup, 4, exec, $wsaction -g movetoworkspace 4
bind = $kb_move_window_to_workspaceGroup, 5, exec, $wsaction -g movetoworkspace 5
bind = $kb_move_window_to_workspaceGroup, 6, exec, $wsaction -g movetoworkspace 6
bind = $kb_move_window_to_workspaceGroup, 7, exec, $wsaction -g movetoworkspace 7
bind = $kb_move_window_to_workspaceGroup, 8, exec, $wsaction -g movetoworkspace 8
bind = $kb_move_window_to_workspaceGroup, 9, exec, $wsaction -g movetoworkspace 9
bind = $kb_move_window_to_workspaceGroup, 0, exec, $wsaction -g movetoworkspace 10
# Move window to workspace -1/+1
binde = Super+Alt, Page_Up, movetoworkspace, -1
binde = Super+Alt, Page_Down, movetoworkspace, +1
bind = Super+Alt, mouse_down, movetoworkspace, -1
bind = Super+Alt, mouse_up, movetoworkspace, +1
binde = Ctrl+Super+Shift, right, movetoworkspace, +1
binde = Ctrl+Super+Shift, left, movetoworkspace, -1
# Move window to/from special workspace
bind = Ctrl+Super+Shift, up, movetoworkspace, special:special
bind = Ctrl+Super+Shift, down, movetoworkspace, e+0
bind = Super+Alt, S, movetoworkspace, special:special

# Window groups
binde = $kb_window_group_cycle_next, cyclenext, activewindow
binde = $kb_window_group_cycle_prev, cyclenext, prev, activewindow
binde = Ctrl+Alt, Tab, changegroupactive, f
binde = Ctrl+Shift+Alt, Tab, changegroupactive, b
bind = $kb_toggle_group, togglegroup
bind = $kb_ungroup_window, moveoutofgroup
bind = Super+Shift, Comma, lockactivegroup, toggle

# Window actions
bind = Super, left, movefocus, l
bind = Super, right, movefocus, r
bind = Super, up, movefocus, u
bind = Super, down, movefocus, d
bind = Super+Shift, left, movewindow, l
bind = Super+Shift, right, movewindow, r
bind = Super+Shift, up, movewindow, u
bind = Super+Shift, down, movewindow, d
binde = Super, Minus, splitratio, -0.1
binde = Super, Equal, splitratio, 0.1
bindm = Super, mouse:272, movewindow
bindm = $kb_move_window, movewindow
bindm = Super, mouse:273, resizewindow
bindm = $kb_resize_window, resizewindow
bind = Ctrl+Super, Backslash, centerwindow, 1
bind = Ctrl+Super+Alt, Backslash, resizeactive, exact 55% 70%
bind = Ctrl+Super+Alt, Backslash, centerwindow, 1
bind = $kb_window_pip, exec, caelestia resizer pip  # Move window to picture-in-picture mode
bind = $kb_pin_window, pin
bind = $kb_window_fullscreen, fullscreen, 0
bind = $kb_window_bordered_fullscreen, fullscreen, 1  # Fullscreen with borders
bind = $kb_toggle_window_floating, togglefloating,
bind = $kb_close_window, killactive,

# Special workspace toggles
bind = $kb_system_monitor, exec, caelestia toggle sysmon
bind = $kb_music_player, exec, caelestia toggle music
bind = $kb_communication, exec, caelestia toggle communication
bind = $kb_todo_list, exec, hyprctl dispatch togglespecialworkspace todo
bind = Ctrl+Shift, Escape, exec, hyprctl dispatch togglespecialworkspace terminal

# Apps
bind = $kb_launch_terminal, exec, app2unit -- $app_terminal
bind = $kb_launch_browser, exec, app2unit -- $app_browser
bind = $kb_launch_editor, exec, app2unit -- $app_editor
bind = Super, G, exec, app2unit -- github-desktop
bind = $kb_launch_file_manager, exec, app2unit -- $app_file_manager
bind = Super+Alt, E, exec, app2unit -- nemo
bind = Ctrl+Alt, Escape, exec, app2unit -- qps
bind = Ctrl+Alt, V, exec, app2unit -- pavucontrol

# Utilities
bindl = , Print, exec, caelestia screenshot  # Full screen capture > clipboard
bind = Super+Shift, S, global, caelestia:screenshotFreeze  # Capture region (freeze)
bind = Super+Shift+Alt, S, global, caelestia:screenshot  # Capture region
bind = Super+Alt, R, exec, caelestia record -s  # Record screen with sound
bind = Ctrl+Alt, R, exec, caelestia record  # Record screen
bind = Super+Shift+Alt, R, exec, caelestia record -r  # Record region
bind = Super+Shift, C, exec, hyprpicker -a  # Colour picker

# Volume
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = Super+Shift, M, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86AudioRaiseVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ $sys_volume_step%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume @DEFAULT_AUDIO_SINK@ $sys_volume_step%-

# Sleep
bind = Super+Shift, L, exec, systemctl suspend-then-hibernate

# Clipboard and emoji picker
bind = Super, V, exec, pkill fuzzel || caelestia clipboard
bind = Super+Alt, V, exec, pkill fuzzel || caelestia clipboard -d
bind = Super, Period, exec, pkill fuzzel || caelestia emoji -p
bindl = Ctrl+Shift+Alt, V, exec, sleep 0.5s && ydotool type -d 1 "$(cliphist list | head -1 | cliphist decode)"  # Alternate paste

# Testing
bindl = Super+Alt, f12, exec, notify-send -u low -i dialog-information-symbolic 'Test notification' "Here's a really long message to test truncation and wrapping\nYou can middle click or flick this notification to dismiss it!" -a 'Shell' -A "Test1=I got it!" -A "Test2=Another action"
