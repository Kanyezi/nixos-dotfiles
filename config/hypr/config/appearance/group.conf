# =============================================================================
# 窗口组设置
# =============================================================================
group {
    col.border_active = $ui_active_border_color
    col.border_inactive = $ui_inactive_border_color
    col.border_locked_active = $ui_active_border_color
    col.border_locked_inactive = $ui_inactive_border_color

    # =========================================================================
    # 组栏配置
    # =========================================================================
    groupbar {
        font_family = JetBrains Mono NF
        font_size = 15
        gradients = true
        gradient_round_only_edges = false
        gradient_rounding = 5
        height = 25
        indicator_height = 0
        gaps_in = 3
        gaps_out = 3

        text_color = rgb($onPrimary)
        col.active = rgba($primaryd4)
        col.inactive = rgba($outlined4)
        col.locked_active = rgba($primaryd4)
        col.locked_inactive = rgba($secondaryd4)
    }
}
